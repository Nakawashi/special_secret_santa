  <rect x="20" y="20" width="1160" height="590" rx="24" fill="none" stroke="#7a1c12" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>

  <!-- gift icon -->
  <g transform="translate(120 195) scale(4)">
    <rect x="14" y="28" width="36" height="24" rx="2" fill="#fff" stroke="#7a1c12" stroke-width="2"/>
