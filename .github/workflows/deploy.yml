name: Deploy to Infomaniak

# Déploie le site sur l'hébergement Infomaniak par SFTP à chaque push sur main.
# (Le FTPS n'est pas supporté par ce serveur — erreur "500 This security
# scheme is not implemented" — donc on passe par SFTP/SSH, port 22.)
# Les identifiants sont lus depuis les "Secrets" du dépôt GitHub, jamais commités.

on:
  push:
    branches: [main]
  workflow_dispatch: # permet aussi un déclenchement manuel depuis l'onglet Actions

concurrency:
  group: deploy-infomaniak
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # On ne pousse que le site : on rassemble les fichiers utiles dans _site/.
      # Ainsi rien d'autre (git, config, docs) ne part sur le serveur.
      - name: Stage site files
        run: |
          mkdir _site
          cp index.html style.css LICENSE _site/
          cp -r js _site/

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          # Dossier cible sur le serveur. Sur Infomaniak, l'utilisateur SFTP
          # atterrit déjà dans le dossier du site, donc "." convient souvent.
          # Surcharge possible via le secret FTP_SERVER_DIR (ex. "/web/").
          SFTP_REMOTE_PATH: ${{ secrets.FTP_SERVER_DIR || '.' }}
        run: |
          lftp -c "
          set sftp:auto-confirm yes;
          set net:max-retries 2;
          set net:timeout 15;
          open -u '$SFTP_USERNAME','$SFTP_PASSWORD' sftp://$SFTP_SERVER;
          mirror --reverse --verbose ./_site/ '$SFTP_REMOTE_PATH';
          "
