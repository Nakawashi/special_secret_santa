name: Deploy to Infomaniak

# Déploie le site sur l'hébergement Infomaniak par FTP (port 21) à chaque push
# sur main. Ce serveur n'accepte pas le TLS (FTPS -> "500 security scheme not
# implemented") ni SSH/SFTP, donc on utilise le FTP simple.
# ATTENTION : en FTP simple, identifiant et mot de passe transitent en clair.
# Les identifiants sont lus depuis les "Secrets" du dépôt GitHub, jamais commités.

on:
  push:
    branches: [main]
  workflow_dispatch: # permet aussi un déclenchement manuel depuis l'onglet Actions

concurrency:
  group: deploy-infomaniak
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # On ne pousse que le site : on rassemble les fichiers utiles dans _site/.
      # Ainsi rien d'autre (git, config, docs) ne part sur le serveur.
      - name: Stage site files
        run: |
          mkdir _site
          cp index.html style.css LICENSE _site/
          cp -r js _site/
          # Cache-busting : ajoute ?v=<commit> derrière chaque js/css dans
          # index.html pour forcer les navigateurs à recharger après un déploiement.
          perl -i -pe 's{(src="js/[^"]+\.js)"}{$1?v=$ENV{GITHUB_SHA}"}g; s{(href="style\.css)"}{$1?v=$ENV{GITHUB_SHA}"}g' _site/index.html
          echo "Références versionnées dans index.html :"
          grep -E "js/|style\.css" _site/index.html

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # DIAGNOSTIC TEMPORAIRE : montre où l'on atterrit et l'arborescence
      # distante, pour identifier le vrai dossier racine du site.
      # À retirer une fois le bon FTP_SERVER_DIR trouvé.
      - name: Diagnose remote tree
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
        run: |
          lftp -c "
          set ftp:ssl-allow no;
          set ftp:passive-mode on;
          set net:max-retries 2;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' -p $FTP_PORT ftp://$FTP_SERVER;
          echo '=== dossier de connexion (pwd) ===';
          pwd;
          echo '=== contenu de la racine ===';
          cls -l;
          echo '=== arborescence (profondeur 3) ===';
          find --max-depth=3;
          "

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
          # Dossier cible sur le serveur. Sur Infomaniak, l'utilisateur FTP
          # atterrit déjà dans le dossier du site, donc "." convient souvent.
          # Surcharge possible via le secret FTP_SERVER_DIR (ex. "/web/").
          FTP_REMOTE_PATH: ${{ secrets.FTP_SERVER_DIR || '.' }}
        run: |
          lftp -c "
          set ftp:ssl-allow no;
          set ftp:passive-mode on;
          set net:max-retries 2;
          set net:timeout 15;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' -p $FTP_PORT ftp://$FTP_SERVER;
          mirror --reverse --verbose ./_site/ '$FTP_REMOTE_PATH';
          "
